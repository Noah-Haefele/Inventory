<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventur</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet/navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet/events.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet/home.css') }}">
    <script type="module" src="{{ url_for('static', filename='js/sessiontimer.js') }}"></script>
    <style>
        .detail-container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
        }


        .modal-content {
            background-color: var(--bg-content);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
            width: 600px;
            max-height: 85vh;
            /* keeps maximum height */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* prevents hole modal from scroling*/
        }

        #inventory-checklist {
            margin: 15px 0;
            overflow-y: auto;
            /* activates scrolbar if needed */
            flex-grow: 1;
            padding-right: 5px;
        }

        .check-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid var(--border-color);
            gap: 10px;
        }


        .qty-column {
            width: 200px;
            text-align: center;
        }

        .qty-input {
            width: 65px;
            padding: 5px;
            border: 1px solid #000000;
            border-radius: 4px;
            text-align: center;
        }

        @media (max-width: 55rem) {
            #eventDetail-table thead {
                display: none !important;
            }

            .number-wrapper {
                width: 100px !important;
                min-width: 100px !important;
                margin-left: auto;
            }

            #eventDetail-table tr {
                display: block !important;
                width: 100% !important;
                margin-bottom: 15px !important;
                border: 1px solid var(--border-color) !important;
                border-radius: 8px !important;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2) !important;
            }

            #eventDetail-table td {
                display: flex !important;
                width: 100% !important;
                justify-content: flex-start !important;
                align-items: flex-start !important;
                padding: 10px 15px !important;
                border-right: none !important;
                border-bottom: 1px solid var(--devider) !important;
                text-align: left !important;
                height: auto !important;
            }

            #eventDetail-table td::before {
                content: attr(data-label);
                font-weight: bold;
                color: var(--text-muted);
                text-align: left;
            }
        }
    </style>
    <script src="{{ url_for('static', filename='js/event_detail.js') }}"></script>
</head>

<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="{{ url_for('home') }}" class="nav-item">Home</a>
            <a href="{{ url_for('events') }}" class="nav-item">Veranstaltungen</a>
            {% if role == 'Administrator' %}
            <a href="{{ url_for('users') }}" class="nav-item">Benutzerverwaltung</a>
            {% endif %}
        </div>
        <div class="nav-right">
            <span class="user-name">Angemeldet als: {{ username }}</span>
            <a href="{{ url_for('logout') }}" class="logout-btn" style="text-decoration: none;">Logout</a>
        </div>
    </nav>
    <div class="content">
        <a href="{{ url_for('events') }}">← Zurück</a>
        <div style="display: flex; justify-content: space-between;" id="detail-context" data-event-id="{{ event.id }}">
            <h2>{{ event.name }}</h2>
            <div class="header-actions">
                <button class="square-btn btn-blue" onclick="toggleSortModal('assignedSortModal', true)" title="Sortierung">⬍</button>
                <button class="square-btn btn-green" id="open-modal-btn">+</button>
            </div>
        </div>
        <table id="eventDetail-table">
            <thead>
                <tr>
                    <th>Gruppe</th>
                    <th>Name</th>
                    <th>Lagerort</th>
                    <th class="qty-column">Menge</th>
                    <th style="width: 80px;">Aktion</th>
                </tr>
            </thead>
            <tbody id="assigned-body"></tbody>
        </table>

    </div>

    <div id="addItemModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0;">Geräte auswählen</h3>
                <button class="square-btn btn-blue" onclick="toggleSortModal('checklistSortModal', true)" title="Sortierung">⬍</button>
            </div>
            <div id="inventory-checklist"></div>
            <div style="margin-top: 20px; text-align: right;">
                <button class="normal-btn btn-red" onclick="toggleModal(false)">Abbrechen</button>
                <button class="normal-btn btn-green" id="confirm-bulk-add-btn">Speichern</button>
            </div>
        </div>
    </div>

    <div id="assignedSortModal" class="modal">
        <div class="modal-content">
            <h3>Sortierung - Zugewiesene Geräte</h3>
            <div id="assignedSortOptions" style="margin-top: 20px;">
                <label class="sort-radio-label">
                    <input type="radio" name="assignedSort" value="default" class="radio-input">
                    <div class="radio-btn-custom">
                        <div class="radio-btn-inner"></div>
                    </div>
                    <span>Standardsortierung</span>
                </label>
                <label class="sort-radio-label">
                    <input type="radio" name="assignedSort" value="name-asc" class="radio-input">
                    <div class="radio-btn-custom">
                        <div class="radio-btn-inner"></div>
                    </div>
                    <span>Name A-Z</span>
                </label>
                <label class="sort-radio-label">
                    <input type="radio" name="assignedSort" value="name-desc" class="radio-input">
                    <div class="radio-btn-custom">
                        <div class="radio-btn-inner"></div>
                    </div>
                    <span>Name Z-A</span>
                </label>
                <label class="sort-radio-label">
                    <input type="radio" name="assignedSort" value="group" class="radio-input">
                    <div class="radio-btn-custom">
                        <div class="radio-btn-inner"></div>
                    </div>
                    <span>Gruppe</span>
                </label>
                <label class="sort-radio-label">
                    <input type="radio" name="assignedSort" value="lagerort" class="radio-input">
                    <div class="radio-btn-custom">
                        <div class="radio-btn-inner"></div>
                    </div>
                    <span>Lagerort</span>
                </label>
            </div>
            <div style="margin-top: 20px;">
                <button class="normal-btn btn-green" onclick="toggleSortModal('assignedSortModal', false)">Ok</button>
            </div>
        </div>
    </div>

    <div id="checklistSortModal" class="modal">
        <div class="modal-content">
            <h3>Sortierung - Geräte auswählen</h3>
            <div id="checklistSortOptions" style="margin-top: 20px;">
                <label class="sort-radio-label">
                    <input type="radio" name="checklistSort" value="default" class="radio-input">
                    <div class="radio-btn-custom">
                        <div class="radio-btn-inner"></div>
                    </div>
                    <span>Standardsortierung</span>
                </label>
                <label class="sort-radio-label">
                    <input type="radio" name="checklistSort" value="name-asc" class="radio-input">
                    <div class="radio-btn-custom">
                        <div class="radio-btn-inner"></div>
                    </div>
                    <span>Name A-Z</span>
                </label>
                <label class="sort-radio-label">
                    <input type="radio" name="checklistSort" value="name-desc" class="radio-input">
                    <div class="radio-btn-custom">
                        <div class="radio-btn-inner"></div>
                    </div>
                    <span>Name Z-A</span>
                </label>
                <label class="sort-radio-label">
                    <input type="radio" name="checklistSort" value="group" class="radio-input">
                    <div class="radio-btn-custom">
                        <div class="radio-btn-inner"></div>
                    </div>
                    <span>Gruppe</span>
                </label>
                <label class="sort-radio-label">
                    <input type="radio" name="checklistSort" value="lagerort" class="radio-input">
                    <div class="radio-btn-custom">
                        <div class="radio-btn-inner"></div>
                    </div>
                    <span>Lagerort</span>
                </label>
            </div>
            <div style="margin-top: 20px;">
                <button class="normal-btn btn-green" onclick="toggleSortModal('checklistSortModal', false)">Ok</button>
            </div>
        </div>
    </div>
</body>
<!--Can be changed to another url-->
<footer class="site-footer">
    <div class="footer-links">
        <a href="https://home.graf-rasso-gymnasium.de/home/impressum/" target="_blank">Impressum</a>
        <span class="footer-divider">|</span>
        <a href="https://home.graf-rasso-gymnasium.de/home/datenschutzerklaerung/"
            target="_blank">Datenschutzhinweise</a>
    </div>
</footer>

<script id="session-config" src="{{ url_for('static', filename='js/sessiontimer.js') }}"
    data-logout-url="{{ url_for('logout') }}">
    </script>

</html>
